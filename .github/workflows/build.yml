# Build sprintly binaries on GitHub Actions.
#
# Source of truth for the code is GitLab. This workflow lives in a separate
# GitHub repo containing ONLY this file — code is never mirrored.
# On each run we git-clone from GitLab, build all 5 targets in parallel,
# and (optionally) publish a GitHub Release.
#
# Required GitHub Secrets in the CI proxy repo:
#   GITLAB_REPO_URL   — e.g. https://gitlab.com/<user>/sprintly.git
#                       (for private repos: https://oauth2:<TOKEN>@gitlab.com/...
#                       or https://<deploy-token-username>:<token>@gitlab.com/...)
#
# Trigger from GitLab CI:
#   POST /repos/<owner>/<repo>/actions/workflows/build.yml/dispatches
#     body: {"ref":"main","inputs":{"ref":"<SHA-or-tag>"}}
#
# Versioning + release logic (повністю автоматичні; обидві базуються на
# `version:` полі у sprintlycli.cabal):
#   • 3 components (e.g. `0.2.0`)   → stable release, GitHub tag `0.2.0`,
#       marked as the repo's latest release.
#   • 4 components (e.g. `0.2.0.1`) → prerelease, GitHub tag `0.2.0.1` (PVP
#       форма як є, без мапінгу у SemVer `-rc.N`), позначається prerelease,
#       latest НЕ чіпає.
#   • Git tag збігається з cabal version байт-у-байт (без `v`-префіксу) — це
#     спрощує співставлення артефактів `sprintly-<VER>-<platform>` з тегом.
#   • Cabal не дозволяє літерних суфіксів (`-rc`, `-SNAPSHOT`) у `version:`
#     через PVP, тому prerelease маркуємо суто 4-м числовим компонентом.
#   • Якщо GitHub release з обчисленим тегом уже існує — workflow ТІЛЬКИ
#     збирає артефакти й не публікує нічого. Це робить безпечним повторний
#     прогін після фейлу одного таргета, і єдиним тригером нового релізу
#     стає бамп `version:` у cabal.
#
# CI зашиває cabal version у назви артефактів (`sprintly-<VER>-<platform>`)
# і у бінарник через -DBUILD_SHA="<short-sha>" (команда `sprintly version`
# друкує обидва).
#
# Architecture note: Linux jobs run on the GitHub-hosted host (ubuntu-*) WITHOUT
# a `container:` block, then `docker run` the benz0li/ghc-musl image only for
# the cabal-build step. This is required because JavaScript actions like
# actions/cache do not work inside Alpine arm64 containers (GitHub does not
# ship arm64-musl node). With this layout actions/cache runs on the glibc host
# and we bind-mount the cabal store into the build container.

name: build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'GitLab git ref to build (SHA, tag, or branch)'
        required: true
        default: 'main'

env:
  GHC_VERSION: '9.8.2'
  CABAL_VERSION: '3.12.1.0'
  # -split-sections розкладає кожну функцію в окрему ELF/Mach-O секцію, після
  # чого linker з --gc-sections (Linux/Windows) або -dead_strip (macOS) викидає
  # мертві секції. Самого -split-sections недостатньо — потрібен пара з GC-flag,
  # який додається per-platform у відповідному build-step нижче.
  # -fexpose-all-unfoldings + -fspecialise-aggressively на цьому стеку
  # парадоксально ЗМЕНШУЮТЬ розмір бінарника: aggressive inlining дозволяє
  # GHC викинути функції, що мають єдиний (тепер inlined) call-site, тому
  # подальший linker dead-strip має більше мертвого коду на викидання.
  # Замір 2026-06-21 (macOS arm64): без цих прапорів бінарник зростає на ~8 МБ.
  COMMON_GHC_OPTS: '-O2 -split-sections -fexpose-all-unfoldings -fspecialise-aggressively'
  GHC_MUSL_IMAGE: 'benz0li/ghc-musl:9.8.2'

jobs:
  # Окремий job, щоб усі білди читали ту саму версію й ту саму перевірку
  # тег↔cabal проходили один раз. matrix job-и беруть value через `needs.prep`.
  prep:
    name: prepare (read version, decide release)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cabal.outputs.version }}
      sha: ${{ steps.cabal.outputs.sha }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      should_release: ${{ steps.meta.outputs.should_release }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Clone source from GitLab
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory '*'
          git clone "${{ secrets.GITLAB_REPO_URL }}" .
          git fetch --all --tags
          git checkout "${{ inputs.ref }}"

      - name: Read cabal version + short SHA
        id: cabal
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 -E '^version:' sprintlycli.cabal | awk '{print $2}')
          SHA=$(git rev-parse --short=12 HEAD)
          if [ -z "$VERSION" ]; then
            echo "::error::could not read version from sprintlycli.cabal"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Cabal version: ${VERSION}"
          echo "Build SHA: ${SHA}"

      - name: Detect release channel + existing release
        id: meta
        shell: bash
        env:
          # GH_TOKEN потрібен для `gh release view` (read-only). Стандартний
          # GITHUB_TOKEN runner-а має достатньо прав на public+private repos.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.cabal.outputs.version }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Конвенція проєкту (див. header workflow):
          #   N.N.N   → stable,     tag <version>, latest=true
          #   N.N.N.M → prerelease, tag <version> (PVP як є), latest=false
          # Tag без `v`-префіксу — щоб збігався з cabal version байт-у-байт
          # і з версією у назвах артефактів.
          # Будь-яка інша форма — помилка (заборонено, аби випадково не
          # зробити несумісну з cabal версію типу `0.2.0-rc`).
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_PRE=true
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_PRE=false
          else
            echo "::error::Cabal version '$VERSION' must match N.N.N (stable) or N.N.N.M (prerelease)."
            exit 1
          fi
          TAG="${VERSION}"
          RELEASE_NAME="sprintly ${TAG}"
          # Якщо release з таким tag уже опубліковано — skip publish; build
          # все одно відбудеться (це дозволяє повторний прогін після фейлу
          # одного таргета, не створюючи дубль-релізу).
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
            echo "::notice::Release $TAG already exists — building artifacts only, no publish."
          else
            SHOULD_RELEASE=true
            echo "::notice::Will publish $TAG (prerelease=$IS_PRE)."
          fi
          {
            echo "tag=$TAG"
            echo "is_prerelease=$IS_PRE"
            echo "should_release=$SHOULD_RELEASE"
            echo "release_name=$RELEASE_NAME"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prep
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            kind: linux-static
          - target: linux-arm64
            os: ubuntu-24.04-arm
            kind: linux-static
          - target: windows-amd64
            os: windows-latest
            kind: native
            ext: .exe
          - target: macos-arm64
            os: macos-14
            kind: native
          # x86_64 macOS збираємо через Rosetta 2 на Apple Silicon runner-і:
          # нативні Intel runners (macos-13) більше недоступні для public
          # репо безкоштовно, а cross-compile з arm64 → x86_64 у GHC поки
          # потребує custom toolchain. Bootstrap ghcup під Rosetta дорогий
          # (~15 хв), тому окремо кешуємо ~/.ghcup розділеним
          # restore+save-патерном (див. нижче).
          - target: macos-x86_64
            os: macos-14
            kind: macos-rosetta

    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.prep.outputs.version }}
      BUILD_SHA: ${{ needs.prep.outputs.sha }}

    steps:
      - name: Clone source from GitLab
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory '*'
          shopt -s dotglob nullglob
          rm -rf ./* || true
          git clone "${{ secrets.GITLAB_REPO_URL }}" .
          git fetch --all --tags
          git checkout "${{ inputs.ref }}"
          git log -1 --oneline

      - name: Compute artifact name
        id: name
        shell: bash
        run: |
          set -euo pipefail
          # Уніфікований формат: sprintly-<version>-<target>[.exe]
          name="sprintly-${VERSION}-${{ matrix.target }}${{ matrix.ext || '' }}"
          echo "artifact=${name}" >> "$GITHUB_OUTPUT"
          echo "Artifact: ${name}"

      # ---- Native (Windows / macOS) toolchain ---------------------------------
      - name: Setup GHC + cabal (native)
        id: setup
        if: matrix.kind == 'native'
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: ${{ env.CABAL_VERSION }}

      # NB: на Windows cabal store НЕ у ~/.cabal/store, а у шляху, який
      # haskell-actions/setup віддає через outputs.cabal-store (зазвичай C:\sr).
      # Тому кешуємо саме цей шлях, інакше Windows-білд щоразу перекомпілює
      # всі залежності з нуля. У ключ додаємо версії GHC/Cabal — щоб бамп
      # тулчейну не дав broken cache hit.
      - name: Cache cabal store (native)
        if: matrix.kind == 'native'
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: cabal-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}-${{ hashFiles('sprintlycli.cabal') }}
          restore-keys: |
            cabal-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}-
            cabal-${{ matrix.target }}-

      - name: Build (native)
        if: matrix.kind == 'native'
        shell: bash
        env:
          ARTIFACT: ${{ steps.name.outputs.artifact }}
        run: |
          set -euo pipefail
          cabal update
          # -DBUILD_SHA вшиває коротке SHA у бінарник; читається у Cli.Commands.
          # Cabal shell-tokenize-ить value --ghc-options і стрипить ОДИН рівень
          # лапок; щоб GHC побачив `-DBUILD_SHA="abc"` (з лапками), треба двічі
          # ескейпнути: external `"..."` для cabal-парсера + internal `\"..\"`
          # для CPP. Перевірено емпірично — без подвійного ескейпу макрос
          # розгортається без лапок і компіляція падає на parse error.
          SHA_OPT='-DBUILD_SHA="\"'"${BUILD_SHA}"'\""'
          # Linker GC: на macOS ld64 розуміє лише -dead_strip; на Windows
          # mingw-ld та lld підтримують GNU-style --gc-sections.
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            LD_GC_OPT='-optl-Wl,-dead_strip'
          else
            LD_GC_OPT='-optl-Wl,--gc-sections'
          fi
          cabal build exe:sprintly \
            --ghc-options="${COMMON_GHC_OPTS}" \
            --ghc-options="${LD_GC_OPT}" \
            --ghc-options="${SHA_OPT}"
          mkdir -p out
          bin=$(cabal list-bin exe:sprintly)
          cp "$bin" "out/${ARTIFACT}"
          strip "out/${ARTIFACT}" || true
          ls -lh out/
          file "out/${ARTIFACT}" || true

      # ---- macOS Intel via Rosetta 2 on macos-14 (Apple Silicon) host --------
      # Кеш-стратегія: ОКРЕМИЙ restore і save для ~/.ghcup, щоб збереження
      # відбувалося ОДРАЗУ після успішного bootstrap, а не як post-step
      # цілого job-у. Інакше будь-який фейл build-кроку → cache.save не
      # викликається → наступний прогін знову платить 15 хв за bootstrap.
      # Це самозакріплюваний фейл-стан: коли кеш найпотрібніший (відлагодження),
      # його якраз і нема. Розділений restore+save цей цикл розриває.
      - name: Restore ghcup toolchain cache (macos-rosetta)
        if: matrix.kind == 'macos-rosetta'
        id: ghcup-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.ghcup
          key: ghcup-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}

      - name: Install x86_64 toolchain via Rosetta
        if: matrix.kind == 'macos-rosetta'
        id: ghcup-install
        shell: bash
        run: |
          set -euo pipefail
          # macos-14 runners ship with Rosetta 2 pre-installed; ensure anyway.
          softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          # Якщо кеш ~/.ghcup відновлено — пропускаємо `curl | sh`, який щоразу
          # стягує і інсталяцію tarball-ів. Це найбільша економія для цього job-у.
          if [ -x "$HOME/.ghcup/bin/ghc" ] && [ -x "$HOME/.ghcup/bin/cabal" ]; then
            echo "ghcup toolchain restored from cache; skipping bootstrap"
            arch -x86_64 "$HOME/.ghcup/bin/ghc" --version
            arch -x86_64 "$HOME/.ghcup/bin/cabal" --version
            exit 0
          fi
          # Install x86_64 GHC + cabal into ~/.ghcup. When run under Rosetta,
          # ghcup downloads the darwin-x86_64 distribution.
          arch -x86_64 /bin/bash <<EOF
          set -eu
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | \
            BOOTSTRAP_HASKELL_NONINTERACTIVE=1 \
            BOOTSTRAP_HASKELL_INSTALL_NO_STACK=1 \
            BOOTSTRAP_HASKELL_INSTALL_HLS= \
            BOOTSTRAP_HASKELL_GHC_VERSION=${GHC_VERSION} \
            BOOTSTRAP_HASKELL_CABAL_VERSION=${CABAL_VERSION} \
            BOOTSTRAP_HASKELL_ADJUST_BASHRC= \
            sh
          export PATH="\$HOME/.ghcup/bin:\$PATH"
          ghc --version
          cabal --version
          EOF

      # Зберігаємо кеш ghcup ОДРАЗУ, не post-step. Дві умови:
      #   1) cache-hit != 'true' — нема сенсу save при відновленому кеші
      #      (key уже зайнятий, save став би no-op з warning'ом);
      #   2) install.outcome == 'success' — щоб не зберегти напіврозпакований
      #      ghcup, якщо bootstrap впав посередині (напр. мережа).
      - name: Save ghcup toolchain cache (macos-rosetta)
        if: matrix.kind == 'macos-rosetta' && steps.ghcup-cache.outputs.cache-hit != 'true' && steps.ghcup-install.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: ~/.ghcup
          key: ghcup-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}

      - name: Restore cabal store cache (macos-rosetta)
        if: matrix.kind == 'macos-rosetta'
        id: cabal-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            dist-newstyle
          key: cabal-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}-${{ hashFiles('sprintlycli.cabal') }}
          restore-keys: |
            cabal-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}-
            cabal-${{ matrix.target }}-

      - name: Build (macos-rosetta)
        if: matrix.kind == 'macos-rosetta'
        id: build-rosetta
        shell: bash
        env:
          ARTIFACT: ${{ steps.name.outputs.artifact }}
        run: |
          set -euo pipefail
          mkdir -p out
          # Quoted heredoc (`<<'EOF'`) забороняє host-shell expansion. Усі
          # змінні (BUILD_SHA, COMMON_GHC_OPTS, ARTIFACT) читаються з env
          # ВНУТРІШНІМ bash-ом — це уникає подвійного escape lapok через
          # два рівні shell-парсингу (host → arch-x86_64 bash), на якому
          # раніше -DBUILD_SHA розгортався без лапок і ламав CPP.
          arch -x86_64 /bin/bash <<'EOF'
          set -eu
          export PATH="$HOME/.ghcup/bin:$PATH"
          cabal update
          # Один рівень escape: `\"` всередині "..."-string дає буквальну `"`,
          # після cabal-stripping одного рівня лапок GHC побачить
          # `-DBUILD_SHA="<sha>"` — рядковий літерал, як треба CPP.
          SHA_OPT="-DBUILD_SHA=\"\\\"${BUILD_SHA}\\\"\""
          # macOS ld64 → -dead_strip (аналог --gc-sections для Mach-O).
          LD_GC_OPT="-optl-Wl,-dead_strip"
          cabal build exe:sprintly \
            --ghc-options="${COMMON_GHC_OPTS}" \
            --ghc-options="${LD_GC_OPT}" \
            --ghc-options="${SHA_OPT}"
          bin=$(cabal list-bin exe:sprintly)
          cp "$bin" "out/${ARTIFACT}"
          strip "out/${ARTIFACT}" || true
          EOF
          ls -lh out/
          file "out/${ARTIFACT}" || true

      # Зберігаємо cabal-store навіть якщо build впав — store coherent на рівні
      # окремих packages (кожна або повністю встановлена, або відсутня), тому
      # часткова збірка корисна для наступного прогону. Умова `always()`
      # перебиває default skip-on-prior-failure.
      - name: Save cabal store cache (macos-rosetta)
        if: matrix.kind == 'macos-rosetta' && always() && steps.cabal-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            dist-newstyle
          key: cabal-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}-${{ hashFiles('sprintlycli.cabal') }}

      # ---- Ad-hoc codesign for macOS (native arm64 + Rosetta x86_64) ---------
      # Без підпису macOS відмовляється запускати скачаний бінарник з
      # "killed: 9" / "is damaged" (особливо на Apple Silicon). Ad-hoc підпис
      # (-s -) не вимагає AppleID акаунту, але дає бінарнику валідний embedded
      # signature, після чого Gatekeeper хоча б показує нормальний діалог
      # замість "damaged". Для файлів з Safari користувачу все одно треба
      # один раз `xattr -d com.apple.quarantine ./sprintly` — це обходиться
      # тільки через notarization з Apple Developer ID ($99/рік).
      # --options=runtime (hardened runtime) додаємо одразу: якщо колись
      # додамо notarization, hardened runtime для неї обов'язковий.
      - name: Ad-hoc codesign (macOS)
        if: (matrix.kind == 'native' && startsWith(matrix.target, 'macos')) || matrix.kind == 'macos-rosetta'
        shell: bash
        env:
          ARTIFACT: ${{ steps.name.outputs.artifact }}
        run: |
          set -euo pipefail
          codesign --force --options=runtime --sign - "out/${ARTIFACT}"
          codesign --verify --strict --verbose=2 "out/${ARTIFACT}"
          codesign --display --verbose=2 "out/${ARTIFACT}" 2>&1 | head -20

      # ---- Linux static (musl, via docker run on the host) --------------------
      - name: Cache cabal store (linux-static)
        if: matrix.kind == 'linux-static'
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/cabal-store
            ${{ github.workspace }}/.cache/cabal-packages
            ${{ github.workspace }}/dist-newstyle
          key: cabal-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}-${{ hashFiles('sprintlycli.cabal') }}
          restore-keys: |
            cabal-${{ matrix.target }}-ghc${{ env.GHC_VERSION }}-cabal${{ env.CABAL_VERSION }}-
            cabal-${{ matrix.target }}-

      - name: Build (linux-static via docker)
        if: matrix.kind == 'linux-static'
        shell: bash
        env:
          ARTIFACT: ${{ steps.name.outputs.artifact }}
        run: |
          set -euo pipefail
          mkdir -p .cache/cabal-store .cache/cabal-packages out
          # benz0li image is multi-arch; docker pulls the right variant for the
          # host's architecture (ubuntu-latest=amd64, ubuntu-24.04-arm=arm64).
          # COMMON_GHC_OPTS, BUILD_SHA, ARTIFACT передаємо у контейнер через -e.
          # SHA_OPT збираємо ВСЕРЕДИНІ контейнера: cabal стрипить один рівень
          # лапок з --ghc-options value, тому треба `"\"abc\""` щоб GHC побачив
          # `BUILD_SHA="abc"` як рядковий літерал.
          docker run --rm \
            -e BUILD_SHA="${BUILD_SHA}" \
            -e COMMON_GHC_OPTS="${COMMON_GHC_OPTS}" \
            -e ARTIFACT="${ARTIFACT}" \
            -v "${PWD}:/work" -w /work \
            -v "${PWD}/.cache/cabal-store:/root/.cabal/store" \
            -v "${PWD}/.cache/cabal-packages:/root/.cabal/packages" \
            "${GHC_MUSL_IMAGE}" \
            sh -eu -c '
              cabal update
              SHA_OPT="-DBUILD_SHA=\"\\\"${BUILD_SHA}\\\"\""
              # GNU ld у musl-образі підтримує --gc-sections; разом з
              # -split-sections у COMMON_GHC_OPTS це викидає мертві секції.
              LD_GC_OPT="-optl-Wl,--gc-sections"
              cabal build exe:sprintly \
                --enable-executable-static \
                --ghc-options="${COMMON_GHC_OPTS}" \
                --ghc-options="${LD_GC_OPT}" \
                --ghc-options="${SHA_OPT}"
              cp "$(cabal list-bin exe:sprintly)" "/work/out/${ARTIFACT}"
              # -R .comment / -R .note: викидаємо ідентифікатори ld + build-id;
              # для CLI з публічним релізом ці секції безкорисні.
              strip --strip-all -R .comment -R .note "/work/out/${ARTIFACT}"
            '
          ls -lh out/
          file "out/${ARTIFACT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.artifact }}
          path: out/${{ steps.name.outputs.artifact }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: GitHub Release
    needs: [prep, build]
    # Реліз публікуємо лише якщо prep вирішив, що це нова версія. Інакше
    # job просто скіпається (артефакти вже завантажені у попередніх job-ах).
    if: needs.prep.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prep.outputs.version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Fetch installer scripts from GitLab
        shell: bash
        run: |
          set -euo pipefail
          # Клонуємо у tmp, не у dist/, щоб не зачепити вже завантажені артефакти.
          git config --global --add safe.directory '*'
          git clone --depth=1 --branch "${{ inputs.ref }}" \
            "${{ secrets.GITLAB_REPO_URL }}" src
          cp src/scripts/install.sh   dist/install.sh
          cp src/scripts/uninstall.sh dist/uninstall.sh
          chmod +x dist/install.sh dist/uninstall.sh

      - name: Write version manifest
        shell: bash
        env:
          VERSION: ${{ needs.prep.outputs.version }}
        run: |
          set -euo pipefail
          # plain-text ассет для ендпоінту GET /latest/version проксі-хосту:
          # get.sprintly.cloud стрімить releases/latest/download/version. Через
          # latest-флаг GitHub (make_latest нижче) цей файл завжди = останній
          # СТАБІЛЬНИЙ реліз, що збігається з default-ом resolve_version у install.sh.
          printf '%s\n' "${VERSION}" > dist/version
          cat dist/version

      - name: Compute checksums
        run: |
          cd dist
          # install.sh / uninstall.sh / version теж потрапляють у SHA256SUMS.txt —
          # корисно для аудиту, навіть якщо звичайний користувач тягне їх через curl|sh.
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
          ls -lh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prep.outputs.tag }}
          name: ${{ needs.prep.outputs.release_name }}
          # prerelease=true для 4-component cabal version (N.N.N.M).
          # make_latest виставляємо ЯВНО протилежним: stable → latest=true,
          # prerelease → latest=false. Без явного make_latest GitHub може
          # автоматично підняти release у latest за semver, що для prerelease
          # було б некоректно.
          prerelease: ${{ needs.prep.outputs.is_prerelease }}
          make_latest: ${{ needs.prep.outputs.is_prerelease == 'true' && 'false' || 'true' }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            dist/sprintly-${{ env.VERSION }}-linux-amd64
            dist/sprintly-${{ env.VERSION }}-linux-arm64
            dist/sprintly-${{ env.VERSION }}-windows-amd64.exe
            dist/sprintly-${{ env.VERSION }}-macos-arm64
            dist/sprintly-${{ env.VERSION }}-macos-x86_64
            dist/install.sh
            dist/uninstall.sh
            dist/version
            dist/SHA256SUMS.txt
